name: CI Compose
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docker compose
        run: docker compose up --build -d
      - name: Wait for app (mysql healthcheck + Spring startup)
        run: |
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health || curl -sf http://localhost:8080/; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v
